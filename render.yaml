databases:
  - name: dam-db
    plan: free
    databaseName: dam_db

services:
  - type: web
    name: ca-administration
    env: python
    buildCommand: "pip install --upgrade pip setuptools wheel && pip install -r requirements.txt"
    startCommand: "cd DaM/backend && python -c 'from database import init_db; init_db()' && gunicorn -w 4 -b 0.0.0.0:$PORT 'app:create_app()'"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dam-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
      - key: PYTHON_VERSION
        value: 3.11.8
