<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CA Administration. Securely organize, store, and manage your files with automatic categorization and Google Drive integration.">
    <title>CA Administration</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6C5CE7">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <!-- Logo -->
                <div class="auth-logo">
                    <h1>📁 CA Administration</h1>

                </div>

                <!-- Tabs -->
                <div class="auth-tabs">
                    <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
                    <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
                </div>

                <!-- Error display -->
                <div class="auth-error" id="auth-error"></div>

                <!-- Login Form -->
                <form class="auth-form active" id="form-login" onsubmit="handleLogin(event)">
                    <div class="input-group">
                        <label for="login-email">Email Address</label>
                        <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email">
                    </div>
                    <div class="input-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" placeholder="Enter your password" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-primary" id="login-btn">
                        Sign In
                    </button>
                </form>

                <!-- Signup Form -->
                <form class="auth-form" id="form-signup" onsubmit="handleSignup(event)">
                    <div class="input-group">
                        <label for="signup-email">Email Address</label>
                        <input type="email" id="signup-email" placeholder="you@example.com" required autocomplete="email">
                    </div>
                    <div class="input-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
                    </div>
                    <div class="input-group">
                        <label for="signup-confirm">Confirm Password</label>
                        <input type="password" id="signup-confirm" placeholder="Re-enter password" required minlength="6" autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn btn-primary" id="signup-btn">
                        Create Account
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(e => console.log('SW registration failed:', e));
        }
    </script>
</body>
</html>
